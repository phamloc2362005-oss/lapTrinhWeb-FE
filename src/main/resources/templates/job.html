<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <title>Email Job</title>
</head>

<body style="margin:0; padding:0; background:#f3f3f3; font-family:Arial, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0" style="padding:30px 0;">
        <tr>
            <td align="center">
                <table width="680" cellpadding="0" cellspacing="0" style="background:#fff; border-radius:6px;">

                    <!-- Header -->
                    <tr>
                        <td style="padding:20px 25px;">
                            <table width="100%">
                                <tr>
                                    <td style="font-size:22px;">Loc Pham</td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Divider -->
                    <tr>
                        <td style="padding:0 25px;">
                            <div style="height:1px; background:#e5e5e5;"></div>
                        </td>
                    </tr>

                    <!-- Greeting -->
                    <tr>
                        <td style="padding:15px 25px; font-size:16px; line-height:1.6; ">
                            Hi <span th:text="${name}"></span>,<br>
                            One of these jobs may be your next one. Find out today!
                        </td>
                    </tr>

                    <!-- JOB LIST -->
                    <tr>
                        <td style="padding:10px 25px;">
                            <table width="100%" cellpadding="0" cellspacing="0">

                                <tr th:each="job : ${jobs}">
                                    <td style="padding:10px 0; border-bottom:1px solid #eee;">

                                        <a style="color:#4b57c5; font-size:17px; text-decoration:none;">
                                            <span th:text="${job.name}">Web Developer (PHP, JavaScript)</span>
                                        </a><br>

                                        <span th:text="${job.company.name}" style="font-size:15px;">VINAKET
                                            CO.LTD</span><br>
                                        <span style="font-size:15px;">
                                            <span
                                                th:text="${#numbers.formatDecimal(job.salary, 0, 'COMMA', 0, 'POINT')}">
                                            </span>đ
                                        </span><br>

                                        <span th:each="skill : ${job.skills}" th:text="${skill.name}"
                                            style="display:inline-block; background:#eee; padding:5px 8px; border-radius:4px; font-size:14px; margin-right:5px;">
                                        </span>

                                    </td>
                                </tr>

                            </table>
                        </td>
                    </tr>

                    <!-- Button -->
                    <tr>
                        <td style="padding:20px 25px;">
                            <a href="http://localhost:4173/company/google?id=1"
                                style="display:block; text-align:center; background:#b0002a; color:#fff; padding:15px; border-radius:5px; text-decoration:none;">
                                Xem thêm job tại LocPham Job Hunter
                            </a>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>
</body>

</html>
